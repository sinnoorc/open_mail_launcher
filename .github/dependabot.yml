version: 2
updates:
  - package-ecosystem: pub
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - dart

  - package-ecosystem: pub
    directory: /example
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - dart

  - package-ecosystem: gradle
    directory: /android
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - android

  - package-ecosystem: gradle
    directory: /example/android
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - android

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
