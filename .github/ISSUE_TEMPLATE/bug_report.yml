name: Bug report
description: Report a defect in open_mail_launcher
title: "[Bug]: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please complete the fields below — incomplete reports may be closed.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Affected platform(s)
      multiple: true
      options:
        - iOS
        - Android
    validations:
      required: true

  - type: input
    id: flutter
    attributes:
      label: Flutter version
      placeholder: "3.32.0"
    validations:
      required: true

  - type: input
    id: plugin
    attributes:
      label: Plugin version
      placeholder: "0.2.0"
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version of test device
      placeholder: "iOS 18.2 / Android 14"

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: shell

  - type: textarea
    id: ios-plist
    attributes:
      label: iOS only — relevant LSApplicationQueriesSchemes entries
      description: Paste the schemes section from your Info.plist if the bug is iOS-side.
      render: xml
