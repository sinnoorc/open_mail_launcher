name: Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user-facing or developer-facing problem.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - iOS
        - Android
        - Both
    validations:
      required: true

  - type: checkboxes
    id: breaking
    attributes:
      label: Is this a breaking change to the public Dart API?
      options:
        - label: Yes — would require a major version bump
        - label: No — purely additive
