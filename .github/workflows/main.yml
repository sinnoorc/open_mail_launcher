name: Open Mail Launcher CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dart:
    name: Dart (format, analyze, test, pana)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Test with coverage
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: coverage/lcov.info

      - name: Install pana screenshot toolchain (webp)
        run: sudo apt-get update && sudo apt-get install -y webp

      - name: Pana (informational, does not fail CI)
        continue-on-error: true
        run: |
          dart pub global activate pana
          dart pub global run pana --no-warning .

  android:
    name: Android (example apk + plugin Kotlin tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve plugin deps
        run: flutter pub get

      - name: Resolve example deps
        working-directory: example
        run: flutter pub get

      - name: Build example APK (debug)
        working-directory: example
        run: flutter build apk --debug

      - name: Run plugin Kotlin unit tests
        working-directory: example/android
        run: ./gradlew open_mail_launcher:testDebugUnitTest --stacktrace

  ios:
    name: iOS (pod lib lint + example simulator build)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve plugin deps
        run: flutter pub get

      - name: Resolve example deps
        working-directory: example
        run: flutter pub get

      - name: Pod lib lint
        run: pod lib lint ios/open_mail_launcher.podspec --allow-warnings

      - name: Build example for iOS simulator
        working-directory: example
        run: flutter build ios --debug --no-codesign --simulator
